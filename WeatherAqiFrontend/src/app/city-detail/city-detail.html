<div class="detail-wrapper">
  <header>
    <span class="back" routerLink="/manage">❮</span>
    <h2>{{ cityName }}</h2>
    <span class="menu">⋮</span>
  </header>

  <div class="hero">
    <h1 class="main-temp">34<span>°C</span></h1>
    <p class="condition">Mostly clear</p>
    <p class="stats">27 ~ 35°C Feels like 43°C</p>
  </div>

  <div class="forecast-panel">
    <div class="hourly-scroll">
      <div class="hour-item">
        <p>14:00</p>
        <div class="icon-sun">☀️</div>
        <p>34°</p>
      </div>
      </div>

    <div class="daily-list">
      <div class="day-row">
        <span>04/14 Today</span>
        <span>☀️</span>
        <span>27  <b>35</b></span>
      </div>
      <div class="day-row">
        <span>04/15 Tomorrow</span>
        <span>☀️</span>
        <span>27  <b>35</b></span>
      </div>
    </div>
  </div>
</div>

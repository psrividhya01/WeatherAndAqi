<div class="page">
  <!-- Header -->
  <div class="header">
    <span class="back" (click)="goBack()">‹</span>
    <h1>Settings</h1>
  </div>
  <div class="divider"></div>

  <!-- Items -->
  <div class="list">
    <div class="item" (click)="(null)">
      <span class="label">Home Screen Weather</span>
    </div>

    <div class="item" (click)="(null)">
      <span class="label">Temperature unit</span>
      <span class="value">{{ tempUnit }}</span>
    </div>

    <div class="item" (click)="goToHourlyInterval()">
      <span class="label">Hourly forecast interval</span>
      <span class="value">{{ hourlyInterval }}</span>
      <span class="dot"></span>
    </div>

    <div class="item" (click)="(null)">
      <span class="label">Multi-day forecast format</span>
      <span class="value">{{ forecastFormat }}</span>
    </div>

    <div class="item" (click)="(null)">
      <span class="label">Version</span>
      <span class="value">{{ version }}</span>
    </div>

    <div class="item" (click)="(null)">
      <span class="label">Open-Source Software Statement</span>
    </div>

    <div class="item" (click)="(null)">
      <span class="label">User Agreement</span>
    </div>

    <div class="item" (click)="(null)">
      <span class="label">Privacy</span>
    </div>
  </div>
</div>

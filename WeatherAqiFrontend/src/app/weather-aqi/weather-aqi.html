<div class="weather-wrapper">
  <!-- Combined Header with both designs -->
  <div class="header">
    <h1>{{ city }}</h1>
    <div class="icons">
      <span class="btn">+</span>
      <div class="menu-wrap">
        <span class="btn" (click)="toggleMenu()">⋮</span>
        <div class="dropdown" *ngIf="menuOpen">
          <button (click)="goToSettings()">⚙️ Settings</button>
          <button (click)="shareWeather()">↗️ Share</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Combined Hero Section -->
  <div class="hero">
    <div class="temp-section">
      <div class="temp">{{ currentTemp }}<sup>°C</sup></div>
      <p class="condition">{{ condition }}</p>
      <p class="range">{{ tempMin }} ~ {{ tempMax }}°C &nbsp; Feels like {{ feelsLike }}°C</p>
    </div>
  </div>

  <!-- SVG Curve Graph -->
  <div class="graph">
    <svg viewBox="0 0 360 80" preserveAspectRatio="none">
      <defs>
        <linearGradient id="lg" x1="0%" x2="100%">
          <stop offset="0%" stop-color="#FF6B35" />
          <stop offset="60%" stop-color="#FF9A3C" />
          <stop offset="100%" stop-color="#A8D572" />
        </linearGradient>
      </defs>
      <path
        d="M0,30 C80,32 160,50 240,58 C280,62 320,63 360,64"
        fill="none"
        stroke="url(#lg)"
        stroke-width="3"
        stroke-linecap="round"
      />
      <circle cx="18" cy="30" r="14" fill="white" stroke="#FF6B35" stroke-width="2.5" />
      <text x="18" y="35" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">
        {{ currentTemp }}
      </text>
    </svg>
  </div>

  <!-- Forecast Card -->
  <div class="forecast-card">
    <!-- Tab Toggle -->
    <div class="tabs">
      <button [class.active]="activeTab === 'hourly'" (click)="activeTab = 'hourly'">
        🕐 Hourly
      </button>
      <button [class.active]="activeTab === 'daily'" (click)="activeTab = 'daily'">📅 5-Day</button>
    </div>

    <!-- Hourly View -->
    <div class="hourly" *ngIf="activeTab === 'hourly'">
      <div class="hour-item" *ngFor="let h of hourlyForecast" [class.active]="h.active">
        <span class="icon">{{ h.icon }}</span>
        <span>{{ h.time }}</span>
        <span class="temp-value" *ngIf="h.temp">{{ h.temp }}°</span>
      </div>
    </div>

    <!-- Daily View -->
    <div class="daily" *ngIf="activeTab === 'daily'">
      <p class="section-title">📅 5-day forecast</p>

      <div class="day-row" *ngFor="let d of dailyForecast" [class.today]="d.isToday">
        <span class="label">{{ d.label }}</span>
        <span class="icon">{{ d.icon }}</span>
        <span class="min-val">{{ d.min }}°</span>

        <div class="bar-wrap">
          <div
            class="bar"
            [style.width.%]="getTempBarWidth(d.min, d.max)"
            [style.marginLeft.%]="getTempBarLeft(d.min)"
            [class.active-bar]="d.isToday"
          ></div>
        </div>

        <span class="max-val">{{ d.max }}°</span>
      </div>

      <button class="forecast-btn">5-day forecast</button>
    </div>
  </div>

  <!-- Down Arrow -->
  <div class="arrow">⌄</div>
</div>

<div class="page">
  <!-- Header -->
  <div class="header">
    <span class="back" (click)="goBack()">‹</span>
    <h1>Hourly forecast interval</h1>
  </div>
  <div class="divider"></div>

  <!-- 2-hour Option -->
  <div class="section">
    <div class="option-header" (click)="select('2h')">
      <div>
        <p class="title">2-hour interval</p>
        <p class="desc">Multi-period weather information at a glance.</p>
      </div>
      <div class="radio" [class.checked]="selected === '2-hour interval'"></div>
    </div>

    <div class="chart-card">
      <svg viewBox="0 0 320 90" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="lg2" x1="0%" x2="100%">
            <stop offset="0%" stop-color="#FF6B35" />
            <stop offset="40%" stop-color="#FFD700" />
            <stop offset="70%" stop-color="#00BCD4" />
            <stop offset="100%" stop-color="#4CAF50" />
          </linearGradient>
        </defs>
        <line
          x1="90"
          y1="0"
          x2="90"
          y2="65"
          stroke="#555"
          stroke-width="1"
          stroke-dasharray="4,3"
        />
        <line
          x1="0"
          y1="20"
          x2="320"
          y2="20"
          stroke="#555"
          stroke-width="1"
          stroke-dasharray="4,3"
        />
        <path
          d="M10,20 C50,20 70,22 90,22 C130,23 150,55 170,60 C200,67 240,52 320,45"
          fill="none"
          stroke="url(#lg2)"
          stroke-width="3"
          stroke-linecap="round"
        />
        <circle cx="170" cy="60" r="5" fill="#42A5F5" />
        <text x="170" y="75" text-anchor="middle" font-size="11" fill="#42A5F5" font-weight="bold">
          20
        </text>
        <circle cx="10" cy="20" r="14" fill="white" stroke="#FF6B35" stroke-width="2.5" />
        <text x="10" y="25" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">
          26
        </text>
      </svg>

      <div class="slots">
        <div class="slot" *ngFor="let s of twoHourSlots">
          <span class="icon">{{ s.icon }}</span>
          <span>{{ s.time }}</span>
        </div>
      </div>
    </div>
  </div>

  <!-- 1-hour Option -->
  <div class="section">
    <div class="option-header" (click)="select('1h')">
      <div>
        <p class="title">1-hour interval</p>
        <p class="desc">Hourly weather conditions are clearly visible.</p>
      </div>
      <div class="radio" [class.checked]="selected === '1-hour interval'"></div>
    </div>

    <div class="chart-card">
      <svg viewBox="0 0 320 90" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="lg1" x1="0%" x2="100%">
            <stop offset="0%" stop-color="#FF6B35" />
            <stop offset="50%" stop-color="#FFD700" />
            <stop offset="80%" stop-color="#00BCD4" />
            <stop offset="100%" stop-color="#4CAF50" />
          </linearGradient>
        </defs>
        <line
          x1="90"
          y1="0"
          x2="90"
          y2="65"
          stroke="#555"
          stroke-width="1"
          stroke-dasharray="4,3"
        />
        <line
          x1="0"
          y1="20"
          x2="320"
          y2="20"
          stroke="#555"
          stroke-width="1"
          stroke-dasharray="4,3"
        />
        <path
          d="M10,20 C60,20 80,22 120,35 C160,48 190,65 220,65 C260,65 290,50 320,40"
          fill="none"
          stroke="url(#lg1)"
          stroke-width="3"
          stroke-linecap="round"
        />
        <circle cx="220" cy="65" r="5" fill="#42A5F5" />
        <text x="220" y="80" text-anchor="middle" font-size="11" fill="#42A5F5" font-weight="bold">
          20
        </text>
        <circle cx="10" cy="20" r="14" fill="white" stroke="#FF6B35" stroke-width="2.5" />
        <text x="10" y="25" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">
          26
        </text>
      </svg>

      <div class="slots">
        <div class="slot" *ngFor="let s of oneHourSlots">
          <span class="icon">{{ s.icon }}</span>
          <span>{{ s.time }}</span>
        </div>
      </div>
    </div>
  </div>
</div>
